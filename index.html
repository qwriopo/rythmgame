<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qwriopo's Rhythm Game</title>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { border: 2px solid #00ff46; box-shadow: 0 0 15px rgba(0, 255, 70, 0.3); background-color: #111; }
        #overlay { position: absolute; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

<div id="overlay">
    <h2 id="msg">Press SPACE to Start</h2>
    <p>Keys: D F J K</p>
</div>
<canvas id="gameCanvas"></canvas>

<script>
/**
 * [설정] 사용자의 GitHub 레포지토리 정보 기반 경로
 */
const BASE_URL = "https://raw.githubusercontent.com/qwriopo/rythmgame/main/";
const W = 1200;
const H = W * (9/16);

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

// 상태 변수 (Pygame main.py 로직 계승)
let isPlaying = false;
let startTime = 0;
let score = 0;
let combo = 0;
let rate = "READY";
let notes = { 1: [], 2: [], 3: [], 4: [] };

// 리소스 로딩 (Pygame os.path.join 구조 반영)
const assets = {
    bg: new Image(),
    note: new Image(),
    audio: new Audio()
};

// GitHub 레파지토리 내 파일 경로 지정
assets.bg.src = `${BASE_URL}img/bg/pupa.jpg`;
assets.note.src = `${BASE_URL}img/gear1/NOTE1.png`;
assets.audio.src = `${BASE_URL}song/pupa.mp3`;

/**
 * 노트 판정 로직 (Pygame의 rating(n) 함수 변환)
 */
function checkRating(lane) {
    const currentTime = (Date.now() - startTime) / 1000;
    const laneNotes = notes[lane];
    
    if (laneNotes.length > 0) {
        const note = laneNotes[0];
        const diff = Math.abs(currentTime - note.targetTime);
        
        // Pygame 코드의 판정 시간차 로직 (단위: 초)
        if (diff < 0.04) { setJudge("PERFECT", 1000); }
        else if (diff < 0.08) { setJudge("GREAT", 800); }
        else if (diff < 0.12) { setJudge("GOOD", 500); }
        else if (diff < 0.16) { setJudge("BAD", 200); }
        
        if (diff < 0.16) laneNotes.shift(); 
    }
}

function setJudge(grade, points) {
    rate = grade;
    score += points;
    combo++;
}

/**
 * 렌더링 루프
 */
function update() {
    if (!isPlaying) return;
    
    const currentTime = (Date.now() - startTime) / 1000;
    
    // 1. 배경 (Python: screen.blit(bg_resize, (0, 0)))
    ctx.clearRect(0, 0, W, H);
    if (assets.bg.complete) ctx.drawImage(assets.bg, 0, 0, W, H);
    
    // 2. 기어 레이아웃 (Python: pygame.draw.rect 기어 영역)
    ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
    ctx.fillRect(W/2 - 150, 0, 300, H);
    
    // 3. 판정선 (Python: (h / 24) * 17)
    const judgeLineY = (H / 24) * 17;
    ctx.strokeStyle = "#00ff46";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(W/2 - 150, judgeLineY);
    ctx.lineTo(W/2 + 150, judgeLineY);
    ctx.stroke();

    // 4. 노트 이동 및 그리기 (Python: tile_data[0] 계산 로직)
    const laneX = [W/2 - 112, W/2 - 37, W/2 + 37, W/2 + 112];
    [1, 2, 3, 4].forEach((lane, i) => {
        for (let j = notes[lane].length - 1; j >= 0; j--) {
            const note = notes[lane][j];
            // 속도(350 * speed) 반영
            note.y = judgeLineY + (currentTime - note.targetTime) * 1000; 

            if (assets.note.complete) {
                ctx.drawImage(assets.note, laneX[i] - 30, note.y - 10, 60, 20);
            }

            // MISS 처리 (화면 하단 통과 시)
            if (note.y > H) {
                rate = "MISS";
                combo = 0;
                notes[lane].splice(j, 1);
            }
        }
    });

    // 5. UI 출력 (Python: combo_text, rate_text)
    ctx.fillStyle = "#00ff46";
    ctx.font = "bold 35px Arial";
    ctx.textAlign = "center";
    ctx.fillText(combo > 0 ? combo : "", W/2, H/2);
    
    ctx.fillStyle = "#fff";
    ctx.font = "bold 25px Arial";
    ctx.fillText(rate, W/2, judgeLineY + 80);
    ctx.fillText(score.toString().padStart(6, '0'), W/2, 40);

    requestAnimationFrame(update);
}

// 키 입력 핸들러
window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'd') checkRating(1);
    if (key === 'f') checkRating(2);
    if (key === 'j') checkRating(3);
    if (key === 'k') checkRating(4);
    
    if (e.code === 'Space' && !isPlaying) {
        document.getElementById('overlay').style.display = 'none';
        isPlaying = true;
        startTime = Date.now();
        assets.audio.play().catch(e => console.log("Audio play failed:", e));
        
        // 테스트용 임시 노트 생성기 (나중에 txt 데이터 파싱으로 대체)
        setInterval(() => {
            const l = Math.floor(Math.random() * 4) + 1;
            notes[l].push({ targetTime: (Date.now() - startTime) / 1000 + 2, y: 0 });
        }, 800);
        
        update();
    }
});
</script>
</body>
</html>
